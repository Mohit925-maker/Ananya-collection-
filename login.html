<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-pink-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-pink-600 text-center mb-6">ANANYA</h2>

        <div id="step1">
            <input type="text" id="name" placeholder="Full Name" class="w-full p-3 mb-4 border rounded-lg outline-pink-500">
            <div class="flex mb-4">
                <span class="bg-gray-100 p-3 border border-r-0 rounded-l-lg text-gray-500">+91</span>
                <input type="tel" id="phone" placeholder="Mobile Number" class="w-full p-3 border rounded-r-lg outline-pink-500">
            </div>
            <div id="recaptcha-container" class="mb-4"></div>
            <button onclick="sendOTP()" class="w-full bg-pink-600 text-white py-3 rounded-lg font-bold hover:bg-pink-700 transition">Get OTP</button>
        </div>

        <div id="step2" class="hidden text-center">
            <p class="mb-4 text-gray-600">Enter the OTP sent to your phone</p>
            <input type="text" id="otp" placeholder="6 Digit OTP" class="w-full p-3 mb-4 border rounded-lg text-center font-bold tracking-widest outline-pink-500">
            <button onclick="verifyOTP()" class="w-full bg-black text-white py-3 rounded-lg font-bold hover:bg-gray-800 transition">Verify & Login</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJRYawH4SxjidRKUZjuRVAINe8i_Mf-E0",
            authDomain: "mb-collection-16a7c.firebaseapp.com",
            projectId: "mb-collection-16a7c",
            storageBucket: "mb-collection-16a7c.firebasestorage.app",
            messagingSenderId: "2884770751",
            appId: "1:2884770751:web:ff5419e12f6912cb69df0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let confirmationResult;

        // Render Recaptcha on Load
        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal'
            });
        };

        function sendOTP() {
            const phoneNumber = "+91" + document.getElementById('phone').value;
            const appVerifier = window.recaptchaVerifier;

            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }).catch((err) => alert(err.message));
        }

        function verifyOTP() {
            const code = document.getElementById('otp').value;
            confirmationResult.confirm(code).then(() => {
                alert("Login Successful!");
                window.location.href = "index.html"; // Wapas home page par bhej dega
            }).catch(() => alert("Wrong OTP!"));
        }
    </script>
</body>
</html>
