<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya Boutique - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold text-pink-600">Ananya Hub</h1>
        <a href="cart.html" class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-white text-[10px] rounded-full px-1.5 font-bold">0</span>
        </a>
    </header>

    <div class="p-4">
        <div class="bg-pink-100 rounded-3xl p-6 text-pink-800">
            <h2 class="text-2xl font-bold">New Arrivals</h2>
            <p class="text-sm">Latest Collection is Live!</p>
        </div>
    </div>

    <div class="p-4">
        <h3 class="font-bold text-lg mb-4 text-gray-800">Our Products</h3>
        <div id="productsList" class="product-grid">
            <p class="text-gray-400 col-span-2 text-center py-10">Loading Products...</p>
        </div>
    </div>

    <script>
        // *** NAYA FIREBASE CONFIG ***
        const firebaseConfig = {
            apiKey: "AIzaSyBOhnP6mG5mmFEhruPBL9s-yq_uSV_U4H4",
            authDomain: "mb-collection-1846c.firebaseapp.com",
            projectId: "mb-collection-1846c",
            storageBucket: "mb-collection-1846c.firebasestorage.app",
            messagingSenderId: "139202861306",
            appId: "1:139202861306:web:b2a1f3bf48d6a7dc7a1143"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOAD PRODUCTS FROM FIREBASE
        db.collection("products").orderBy("dateAdded", "desc").onSnapshot(snap => {
            const list = document.getElementById('productsList');
            list.innerHTML = "";
            
            if(snap.empty) {
                list.innerHTML = "<p class='col-span-2 text-center text-gray-400'>Abhi koi products nahi hain.</p>";
                return;
            }

            snap.forEach(doc => {
                const p = doc.data();
                const pId = doc.id;
                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 p-2">
                        <img src="${p.image}" class="w-full h-40 object-cover rounded-xl mb-2" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="p-1">
                            <h4 class="font-bold text-sm text-gray-800 truncate">${p.name}</h4>
                            <p class="text-pink-600 font-bold text-sm">₹${p.price}</p>
                            <button onclick="addToCart('${pId}', '${p.name}', ${p.price}, '${p.image}')" 
                                    class="w-full mt-2 bg-black text-white py-2 rounded-lg text-xs font-bold">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // 2. ADD TO CART FUNCTION
        function addToCart(id, name, price, img) {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            cart.push({id, name, price, img});
            localStorage.setItem('ananya_cart', JSON.stringify(cart));
            updateCartCount();
            alert(name + " added to cart!");
        }

        // 3. CART COUNT UPDATE
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            document.getElementById('cartCount').innerText = cart.length;
        }

        // Initial count check
        updateCartCount();
    </script>
</body>
</html>
