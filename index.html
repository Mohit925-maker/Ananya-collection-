<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya | Unique Women's Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background: linear-gradient(rgba(255,192,203,0.2), rgba(255,192,203,0.2)), 
                        url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-pink-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <h1 class="brand-font text-3xl text-pink-600 font-bold cursor-pointer" onclick="location.reload()">ANANYA</h1>
            
            <div class="hidden md:flex space-x-8 text-xs font-bold tracking-widest uppercase">
                <button onclick="window.location.href='shop.html'" class="hover:text-pink-600">Shop Collection</button>
                <button onclick="window.location.href='sarees.html'" class="hover:text-pink-600">Sarees</button>
                <button onclick="window.location.href='kurtis.html'" class="hover:text-pink-600">Kurtis</button>
                <button onclick="window.location.href='jewelry.html'" class="hover:text-pink-600">Jewelry</button>
            </div>

            <button id="authBtn" class="bg-pink-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg hover:bg-pink-700 transition">
                Checking...
            </button>
        </div>
    </nav>

    <section class="hero-bg h-[400px] flex items-center justify-center text-center">
        <div class="max-w-xl bg-white/60 backdrop-blur-md p-10 rounded-3xl shadow-2xl">
            <h2 class="brand-font text-5xl mb-4 text-gray-900">Be Unique, Be You.</h2>
            <p class="text-gray-600 mb-8 font-light italic">Har libaas mein ek nayi kahani.</p>
            <button onclick="window.location.href='shop.html'" class="bg-black text-white px-10 py-4 rounded-lg uppercase tracking-widest text-xs font-bold hover:bg-gray-800">
                Shop Collection
            </button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-16">
        <h3 class="brand-font text-3xl text-center mb-12">Browse by Style</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 text-center">
            <div onclick="window.location.href='sarees.html'" class="group cursor-pointer">
                <div class="h-80 rounded-2xl overflow-hidden shadow-lg mb-4">
                    <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <h4 class="font-bold text-lg uppercase tracking-wider text-gray-800">Sarees</h4>
                <p class="text-pink-500 text-sm italic">Shop Traditional</p>
            </div>

            <div onclick="window.location.href='kurtis.html'" class="group cursor-pointer">
                <div class="h-80 rounded-2xl overflow-hidden shadow-lg mb-4">
                    <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <h4 class="font-bold text-lg uppercase tracking-wider text-gray-800">Kurtis</h4>
                <p class="text-pink-500 text-sm italic">Shop Modern</p>
            </div>

            <div onclick="window.location.href='jewelry.html'" class="group cursor-pointer">
                <div class="h-80 rounded-2xl overflow-hidden shadow-lg mb-4">
                    <img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <h4 class="font-bold text-lg uppercase tracking-wider text-gray-800">Jewelry</h4>
                <p class="text-pink-500 text-sm italic">Shop Shine</p>
            </div>
        </div>
    </section>

    <footer class="bg-white py-12 border-t text-center">
        <h1 class="brand-font text-2xl text-pink-600 mb-4">ANANYA</h1>
        <p class="text-gray-400 text-xs tracking-[0.3em] uppercase mb-8">Elegance in every thread</p>
        <div class="flex justify-center space-x-6 text-gray-400">
            <a href="#" class="hover:text-pink-600 transition">Instagram</a>
            <a href="#" class="hover:text-pink-600 transition">WhatsApp</a>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJRYawH4SxjidRKUZjuRVAINe8i_Mf-E0",
            authDomain: "mb-collection-16a7c.firebaseapp.com",
            projectId: "mb-collection-16a7c",
            storageBucket: "mb-collection-16a7c.firebasestorage.app",
            messagingSenderId: "2884770751",
            appId: "1:2884770751:web:ff5419e12f6912cb69df0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const authBtn = document.getElementById('authBtn');

        auth.onAuthStateChanged((user) => {
            if (user) {
                authBtn.innerText = "Logout";
                authBtn.onclick = () => {
                    auth.signOut().then(() => location.reload());
                };
            } else {
                authBtn.innerText = "Login / OTP";
                authBtn.onclick = () => {
                    window.location.href = "login.html";
                };
            }
        });
    </script>
</body>
</html>
