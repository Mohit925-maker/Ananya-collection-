<!<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya Hub - Sarees Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <h1 class="text-xl font-bold text-pink-600">Sarees</h1>
        </div>
        <a href="cart.html" class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-white text-[10px] rounded-full px-1.5 font-bold">0</span>
        </a>
    </header>

    <div class="p-4">
        <div id="sareeContainer" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-400 text-sm">Sarees load ho rahi hain...</p>
        </div>
    </div>

    <script>
        // *** NAYA FIREBASE CONFIG ***
        const firebaseConfig = {
            apiKey: "AIzaSyBOhnP6mG5mmFEhruPBL9s-yq_uSV_U4H4",
            authDomain: "mb-collection-1846c.firebaseapp.com",
            projectId: "mb-collection-1846c",
            storageBucket: "mb-collection-1846c.firebasestorage.app",
            messagingSenderId: "139202861306",
            appId: "1:139202861306:web:b2a1f3bf48d6a7dc7a1143"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOAD SAREES ONLY
        db.collection("products")
          .where("category", "==", "Sarees") // Sirf Sarees dikhayega
          .onSnapshot(snap => {
            const container = document.getElementById('sareeContainer');
            container.innerHTML = "";

            if(snap.empty) {
                container.innerHTML = "<p class='col-span-2 text-center text-gray-400 py-10'>Abhi koi Saree available nahi hai.</p>";
                return;
            }

            snap.forEach(doc => {
                const p = doc.data();
                const pId = doc.id;
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 p-2 text-center">
                        <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-2" onerror="this.src='https://via.placeholder.com/200'">
                        <h4 class="font-bold text-xs text-gray-800 truncate px-1">${p.name}</h4>
                        <p class="text-pink-600 font-bold text-sm mb-2">₹${p.price}</p>
                        <button onclick="addToCart('${pId}', '${p.name}', ${p.price}, '${p.image}')" 
                                class="w-full bg-black text-white py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider">
                            Add to Cart
                        </button>
                    </div>
                `;
            });
        });

        // 2. ADD TO CART
        function addToCart(id, name, price, img) {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            cart.push({id, name, price, img});
            localStorage.setItem('ananya_cart', JSON.stringify(cart));
            updateCartCount();
            alert(name + " added to cart!");
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            document.getElementById('cartCount').innerText = cart.length;
        }

        updateCartCount();
    </script>
</body>
</html>
