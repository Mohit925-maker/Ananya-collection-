<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya | My Shopping Bag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm p-4 border-b">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="brand-font text-2xl text-pink-600 cursor-pointer" onclick="window.location.href='index.html'">ANANYA</h1>
            <a href="index.html" class="text-sm font-bold text-gray-500 hover:text-pink-600 uppercase tracking-widest">Back to Shop</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <h2 class="brand-font text-3xl mb-8 border-b pb-4">Your Shopping Bag</h2>

        <div id="cartItems" class="space-y-6">
            <p class="text-center text-gray-400 py-10 italic">Aapka bag khali hai...</p>
        </div>

        <div id="cartSummary" class="mt-12 bg-white p-8 rounded-3xl shadow-lg hidden">
            <div class="flex justify-between text-xl font-bold border-b pb-4">
                <span>Total Amount:</span>
                <span id="totalPrice" class="text-pink-600">₹0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 mt-6 rounded-xl font-bold hover:bg-gray-800 transition shadow-xl">
                Place Order (COD)
            </button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];

        function renderCart() {
            const container = document.getElementById('cartItems');
            const summary = document.getElementById('cartSummary');
            const totalEl = document.getElementById('totalPrice');
            
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10 italic">Aapka bag khali hai. Kuch shopping kijiye!</p>`;
                summary.classList.add('hidden');
                return;
            }

            summary.classList.remove('hidden');
            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += parseInt(item.price);
                container.innerHTML += `
                    <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-pink-50">
                        <img src="${item.image}" class="w-24 h-24 object-cover rounded-xl">
                        <div class="ml-6 flex-grow">
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-pink-600 font-bold">₹${item.price}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 font-bold text-sm">Remove</button>
                    </div>
                `;
            });

            totalEl.innerText = "₹" + total;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('ananya_cart', JSON.stringify(cart));
            renderCart();
        }

        function checkout() {
            alert("Order Placed Successfully! We will contact you soon.");
            localStorage.removeItem('ananya_cart');
            window.location.href = "index.html";
        }

        renderCart();
    </script>
</body>
</html>
