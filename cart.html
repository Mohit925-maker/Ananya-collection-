<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya - Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-pink-600">Shopping Cart</h1>
        <div id="cartItems" class="space-y-4 mb-6">
            </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50">
            <div class="flex justify-between text-lg font-bold mb-6">
                <span>Total Bill:</span>
                <span id="cartTotal" class="text-pink-600">₹0</span>
            </div>
            <button onclick="goToCheckout()" class="w-full bg-black text-white py-4 rounded-2xl font-bold shadow-lg">Checkout Now</button>
        </div>
    </div>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = "";

            if(cart.length === 0) {
                container.innerHTML = "<p class='text-center py-10 text-gray-400'>Cart khali hai!</p>";
                return;
            }

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-4">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-pink-600 font-bold">₹${item.price}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 p-2">✕</button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = "₹" + total;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('ananya_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('ananya_cart', JSON.stringify(cart));
            loadCart();
        }

        function goToCheckout() {
            window.location.href = "checkout.html";
        }

        loadCart();
    </script>
</body>
</html>
