<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'sans-serif'; background: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4">

    <div id="loginLock" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-2xl font-bold text-pink-600 mb-6">ANANYA ADMIN</h2>
        <input type="password" id="adminPin" inputmode="numeric" maxlength="4" placeholder="Enter PIN" class="w-full max-w-xs p-4 rounded-xl border border-pink-200 text-center text-2xl mb-4">
        <button onclick="checkPin()" class="w-full max-w-xs bg-pink-600 text-white py-4 rounded-xl font-bold shadow-lg">Unlock</button>
    </div>

    <div id="adminPanel" class="hidden max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dashboard</h1>
            <button onclick="location.reload()" class="text-red-500 text-xs font-bold">LOGOUT</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="switchTab('ordersTab', this)" class="tab-btn bg-pink-600 text-white flex-1 py-3 rounded-lg text-xs font-bold">ORDERS</button>
            <button onclick="switchTab('addTab', this)" class="tab-btn bg-white flex-1 py-3 rounded-lg text-xs font-bold shadow-sm">ADD PRODUCT</button>
            <button onclick="switchTab('qrTab', this)" class="tab-btn bg-white flex-1 py-3 rounded-lg text-xs font-bold shadow-sm">QR SETTINGS</button>
        </div>

        <div id="ordersTab" class="tab-content active space-y-4">
            <div id="ordersList" class="space-y-4 text-center text-gray-400 italic py-10">Orders loading...</div>
        </div>

        <div id="addTab" class="tab-content bg-white p-6 rounded-2xl shadow-sm space-y-4">
            <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 bg-gray-50 rounded-lg outline-none">
            <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full p-3 bg-gray-50 rounded-lg outline-none">
            <select id="pCategory" class="w-full p-3 bg-gray-50 rounded-lg outline-none">
                <option value="Sarees">Sarees</option>
                <option value="Kurtis">Kurtis</option>
            </select>
            <input type="text" id="pImg" placeholder="Image URL (Link)" class="w-full p-3 bg-gray-50 rounded-lg outline-none">
            <button onclick="uploadProduct()" id="pBtn" class="w-full bg-black text-white py-3 rounded-lg font-bold">Add Product</button>
        </div>

        <div id="qrTab" class="tab-content bg-white p-6 rounded-2xl shadow-sm space-y-4 text-center">
            <h3 class="font-bold text-sm mb-2 uppercase">Payment QR Link</h3>
            <input type="text" id="qrUrl" placeholder="Paste Image Link Here" class="w-full p-3 bg-gray-50 rounded-lg outline-none text-xs border border-pink-100">
            <button onclick="updateQR()" id="qrBtn" class="w-full bg-pink-600 text-white py-3 rounded-lg font-bold">Update QR Code</button>
            <div class="mt-4 p-2 bg-gray-100 rounded-lg">
                <p class="text-[10px] text-gray-400 mb-2">Live QR Preview:</p>
                <img id="qrPreviewImg" src="" class="w-32 mx-auto">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJRYawH4SxjidRKUZjuRVAINe8i_Mf-E0",
            authDomain: "mb-collection-16a7c.firebaseapp.com",
            projectId: "mb-collection-16a7c",
            storageBucket: "mb-collection-16a7c.firebasestorage.app",
            messagingSenderId: "2884770751",
            appId: "1:2884770751:web:ff5419e12f6912cb69df0a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkPin() {
            if(document.getElementById('adminPin').value === "2026") {
                document.getElementById('loginLock').style.display = 'none';
                document.getElementById('adminPanel').classList.remove('hidden');
                loadOrders();
            } else { alert("Wrong PIN!"); }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-pink-600', 'text-white'); b.classList.add('bg-white'); });
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('bg-pink-600', 'text-white');
        }

        async function uploadProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCategory').value;
            const image = document.getElementById('pImg').value;
            if(!name || !price || !image) return alert("Details bhariye!");
            await db.collection("products").add({ name, price, category, image, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Done!"); location.reload();
        }

        async function updateQR() {
            const url = document.getElementById('qrUrl').value;
            if(!url) return alert("Enter URL!");
            await db.collection("settings").doc("payment").set({ qrCode: url });
            alert("QR Updated!"); location.reload();
        }

        function loadOrders() {
            db.collection("orders").orderBy("orderDate", "desc").onSnapshot(snap => {
                const list = document.getElementById('ordersList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-pink-500 text-left">
                        <p class="font-bold text-gray-800">${o.customerName}</p>
                        <p class="text-xs text-gray-500">${o.customerPhone}</p>
                        <p class="text-xs text-gray-600 bg-gray-50 p-2 my-2 rounded">${o.deliveryAddress}</p>
                        <p class="text-[11px] font-bold text-pink-600 border-t pt-2">Total: ₹${o.totalAmount}</p>
                    </div>`;
                });
            });
        }

        db.collection("settings").doc("payment").get().then(doc => {
            if(doc.exists) {
                document.getElementById('qrUrl').value = doc.data().qrCode;
                document.getElementById('qrPreviewImg').src = doc.data().qrCode;
            }
        });
    </script>
</body>
</html>
