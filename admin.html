<<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya Admin - New Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="p-4 bg-pink-50">

    <div id="loginLock" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-2xl font-bold text-pink-600 mb-6">ANANYA ADMIN</h2>
        <input type="password" id="adminPin" inputmode="numeric" maxlength="4" placeholder="Enter PIN" class="w-full max-w-xs p-4 rounded-xl border border-pink-200 text-center text-2xl mb-4">
        <button onclick="checkPin()" class="w-full max-w-xs bg-pink-600 text-white py-4 rounded-xl font-bold">Unlock</button>
    </div>

    <div id="adminPanel" class="hidden max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-center">Admin Dashboard</h1>
        
        <div class="bg-white p-6 rounded-3xl shadow-lg space-y-4 mb-8">
            <h3 class="font-bold text-pink-600 text-center">Naya Product Jodein</h3>
            <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
            <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
            <select id="pCategory" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <option value="Sarees">Sarees</option>
                <option value="Kurtis">Kurtis</option>
            </select>
            <input type="text" id="pImg" placeholder="Image Link (URL)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
            <button onclick="saveProduct()" id="saveBtn" class="w-full bg-black text-white py-4 rounded-xl font-bold">Save Product</button>
        </div>

        <div id="ordersList" class="space-y-4">
            <h3 class="font-bold">Recent Orders:</h3>
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOhnP6mG5mmFEhruPBL9s-yq_uSV_U4H4",
            authDomain: "mb-collection-1846c.firebaseapp.com",
            projectId: "mb-collection-1846c",
            storageBucket: "mb-collection-1846c.firebasestorage.app",
            messagingSenderId: "139202861306",
            appId: "1:139202861306:web:b2a1f3bf48d6a7dc7a1143"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkPin() {
            if(document.getElementById('adminPin').value === "2026") {
                document.getElementById('loginLock').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadOrders();
            } else { alert("Wrong PIN!"); }
        }

        async function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCategory').value;
            const image = document.getElementById('pImg').value;
            const btn = document.getElementById('saveBtn');

            if(!name || !price || !image) return alert("Fill all details!");
            btn.disabled = true; btn.innerText = "Saving...";

            try {
                await db.collection("products").add({
                    name, price: Number(price), category, image, date: new Date().toISOString()
                });
                alert("Product Added!");
                location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; }
        }

        function loadOrders() {
            db.collection("orders").orderBy("orderDate", "desc").onSnapshot(snap => {
                const list = document.getElementById('ordersList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-pink-500 mb-3">
                        <p class="font-bold">${o.customerName} - ₹${o.totalAmount}</p>
                        <p class="text-xs text-gray-500">${o.customerPhone}</p>
                        <p class="text-xs mt-1 italic">${o.deliveryAddress}</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
